<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Breaktime">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/solid.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/fontawesome.min.css">
<title>BREAKTIME REBELLION</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="portrait-msg">↺<br>ROTATE<br>DEVICE</div>

<div id="overlay">
  <img id="logo-img" src="assets/logo.png" alt="Breaktime Rebellion" style="width:min(460px,95vw);display:block;margin:0 auto 10px;border-radius:4px;image-rendering:pixelated;">
  <br><br>
  <div class="go">[ TAP TO START ]</div>
  <!--<div class="rules">◄ ► muovi &nbsp;|&nbsp; ▲▼ scala &nbsp;|&nbsp; ✏ imbratta</div>
  <div class="bonus">+500 lavagna &nbsp;·&nbsp; +200 cartella &nbsp;·&nbsp; +1000 campanella</div>-->
</div>

<div id="wrap">
  <div id="game-area">
    <canvas id="c" width="640" height="400"></canvas>
    <div id="hud-overlay">
      <div id="hud-row">
        <div class="hl"><span id="hL">♥♥♥</span></div>
        <div><i class="fa-solid fa-spray-can hud-icon hud-spray"></i><span class="hg" id="hW">0/6</span></div>
        <div><i class="fa-solid fa-star hud-icon hud-star"></i><span id="hS">00000</span></div>
      </div>
      <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
    </div>
  </div>
  <div id="msg">Tag all boards, then ring the bell!</div>
</div>

<div id="ctrl-joy">
  <div id="joy-base">
    <div id="joy-knob"></div>
  </div>
</div>

<div id="ctrl-action">
  <div id="btn-action">✏</div>
</div>

<script src="js/config.js"></script>
<script src="js/i18n.js"></script>
<script src="js/game.js"></script>
<script>
if (CONFIG.levelTimer === 0) {
  var tw = document.getElementById('timer-bar-wrap');
  if (tw) tw.style.display = 'none';
}
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
