<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Breaktime">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/solid.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/fontawesome.min.css">
<title>BREAKTIME REBELLION</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="portrait-msg">↺<br>ROTATE<br>DEVICE</div>

<div id="overlay">
  <img id="logo-img" src="assets/logo.png" alt="Breaktime Rebellion">
  <div class="go">[ TAP TO START ]</div>

  <div id="title-controls">
    <div id="lvl-chooser">
      <button id="lvl-prev">&#8249;</button>
      <span id="lvl-name"></span>
      <button id="lvl-next">&#8250;</button>
    </div>
    <div id="lang-chooser">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="it">IT</button>
    </div>
    <button id="audio-toggle"></button>
  </div>
</div>

<div id="wrap">
  <div id="game-area">
    <canvas id="c" width="640" height="400"></canvas>
    <div id="hud-overlay">
      <div id="hud-row">
        <div class="hl"><span id="hL">♥♥♥</span></div>
        <div><i class="fa-solid fa-spray-can hud-icon hud-spray"></i><span class="hg" id="hW">0/6</span></div>
        <div><i class="fa-solid fa-star hud-icon hud-star"></i><span id="hS">00000</span></div>
      </div>
      <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
    </div>
  </div>
  <div id="msg"></div>
</div>

<div id="ctrl-joy">
  <div id="joy-base">
    <div id="joy-knob"></div>
  </div>
</div>

<div id="ctrl-action">
  <div id="btn-action">✏</div>
</div>

<script src="js/config.js"></script>
<script src="js/i18n.js"></script>
<script src="js/audio.js"></script>
<script src="js/state.js"></script>
<script src="js/input.js"></script>
<script src="js/physics.js"></script>
<script src="js/entities.js"></script>
<script src="js/draw.js"></script>
<script src="js/game.js"></script>
<script>
// Title screen controls — level chooser, language, audio
(function() {
  var controls = document.getElementById('title-controls');

  // Stop propagation so taps on controls don't start the game
  controls.addEventListener('click',      function(e) { e.stopPropagation(); });
  controls.addEventListener('touchstart', function(e) { e.stopPropagation(); }, {passive: false});

  // ── Audio toggle ────────────────────────────────────────────────────────────
  var audioModes = ['full', 'sfx', 'mute'];
  var audioIcons = {
    full: '<i class="fa-solid fa-volume-high"></i>',
    sfx:  '<i class="fa-solid fa-volume-low"></i>',
    mute: '<i class="fa-solid fa-volume-xmark"></i>',
  };
  var audioBtn = document.getElementById('audio-toggle');
  function refreshAudio() { audioBtn.innerHTML = audioIcons[GameAudio.getMode()]; }
  refreshAudio();
  audioBtn.addEventListener('click', function() {
    var modes = audioModes;
    var next = modes[(modes.indexOf(GameAudio.getMode()) + 1) % modes.length];
    GameAudio.setMode(next);
    refreshAudio();
  });

  // ── Language selector ───────────────────────────────────────────────────────
  var currentLang = document.documentElement.lang;
  document.querySelectorAll('.lang-btn').forEach(function(btn) {
    if (btn.dataset.lang === currentLang) btn.classList.add('active');
    btn.addEventListener('click', function() {
      localStorage.setItem('btr_lang', btn.dataset.lang);
      location.href = location.pathname + '?lang=' + btn.dataset.lang;
    });
  });

  // ── Level chooser (dev only) ────────────────────────────────────────────────
  var lvlChooser = document.getElementById('lvl-chooser');
  if (CONFIG.debug.showLevelChooser && CONFIG.levels.length > 1) {
    lvlChooser.style.display = 'flex';
    var lvlNameEl = document.getElementById('lvl-name');
    function refreshLevel() {
      lvlNameEl.textContent = fmt(STRINGS.missionLabel, currentLevel);
    }
    refreshLevel();
    document.getElementById('lvl-prev').addEventListener('click', function() {
      currentLevel = currentLevel > 1 ? currentLevel - 1 : CONFIG.levels.length;
      refreshLevel();
    });
    document.getElementById('lvl-next').addEventListener('click', function() {
      currentLevel = currentLevel < CONFIG.levels.length ? currentLevel + 1 : 1;
      refreshLevel();
    });
  }

  // ── Timer bar visibility ────────────────────────────────────────────────────
  if (CONFIG.levelTimer === 0) {
    var tw = document.getElementById('timer-bar-wrap');
    if (tw) tw.style.display = 'none';
  }
})();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
