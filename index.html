<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="icon" href="/favicon.ico">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Breaktime">
<meta name="robots" content="noindex, nofollow">
<title>BREAKTIME REBELLION</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="title-mode">

<div id="portrait-msg">
  <img src="assets/pics/logo.png" style="width:72vw;max-width:280px;border-radius:8px;border:2px solid #000;margin-bottom:18px">
  <span id="portrait-text"></span>
</div>

<div id="wrap">
  <div id="panel-left">
    <button id="btn-home" class="panel-btn"><svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M1.5 8h1.5v6h4v-4h3v4h4v-6h1.5l-7-7z"/></svg></button>
    <div id="ctrl-joy">
      <div id="joy-base"><div id="joy-knob"></div></div>
    </div>
  </div>
  <div id="game-area">
    <canvas id="c" width="640" height="400"></canvas>
  </div>
  <div id="panel-right">
    <button id="btn-pause" class="panel-btn"><svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M3 3v10h4V3zm6 0v10h4V3z"/></svg></button>
    <button id="btn-info" class="panel-btn panel-btn-info"><svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><rect x="7" y="7" width="2" height="6"/><circle cx="8" cy="4" r="1"/></svg></button>
    <div id="ctrl-action">
      <div id="btn-action"></div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/layout.js"></script>
<script src="js/levels.js"></script>
<script src="js/i18n.js"></script>
<script src="js/audio.js"></script>
<script src="js/state.js"></script>
<script src="js/input.js"></script>
<script src="js/physics.js"></script>
<script src="js/entities.js"></script>
<script src="js/draw.js"></script>
<div id="screen-fade"></div>
<script src="js/game.js"></script>
<script src="js/title.js"></script>
</body>
</html>
