<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Breaktime">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/solid.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/fontawesome.min.css">
<title>BREAKTIME REBELLION</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="portrait-msg"></div>

<div id="overlay">
  <img id="logo-img" src="assets/pics/logo.png" alt="Breaktime Rebellion">
  <div class="go"></div>

  <div id="title-controls">
    <div id="lvl-chooser">
      <button id="lvl-prev">&#8249;</button>
      <span id="lvl-name"></span>
      <button id="lvl-next">&#8250;</button>
    </div>
    <div id="lang-chooser">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="it">IT</button>
    </div>
    <div id="audio-wrap">
      <button id="audio-toggle"></button>
    </div>
  </div>
</div>

<div id="wrap">
  <div id="game-area">
    <canvas id="c" width="640" height="400"></canvas>
    <div id="hud-overlay">
      <div id="hud-row">
        <div class="hl"><span id="hL">♥♥♥</span></div>
        <div><i id="hud-obj-icon" class="fa-solid fa-spray-can hud-icon hud-spray"></i><span class="hg" id="hW">0/6</span></div>
        <div><svg class="hud-star" width="16" height="14" viewBox="0 0 18 14" xmlns="http://www.w3.org/2000/svg" style="shape-rendering:crispEdges;flex-shrink:0"><rect x="8" y="0" width="2" height="2" fill="currentColor"/><rect x="6" y="2" width="6" height="2" fill="currentColor"/><rect x="0" y="4" width="18" height="2" fill="currentColor"/><rect x="2" y="6" width="14" height="2" fill="currentColor"/><rect x="4" y="8" width="4" height="2" fill="currentColor"/><rect x="10" y="8" width="4" height="2" fill="currentColor"/><rect x="2" y="10" width="4" height="2" fill="currentColor"/><rect x="12" y="10" width="4" height="2" fill="currentColor"/><rect x="0" y="12" width="4" height="2" fill="currentColor"/><rect x="14" y="12" width="4" height="2" fill="currentColor"/></svg><span id="hS">00000</span></div>
      </div>
      <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
    </div>
    <div id="msg"></div>
  </div>
</div>

<div id="ctrl-joy">
  <div id="joy-base">
    <div id="joy-knob"></div>
  </div>
</div>

<div id="ctrl-action">
  <div id="btn-action"></div>
</div>

<script src="js/config.js"></script>
<script src="js/layout.js"></script>
<script src="js/levels.js"></script>
<script src="js/i18n.js"></script>
<script src="js/audio.js"></script>
<script src="js/state.js"></script>
<script src="js/input.js"></script>
<script src="js/physics.js"></script>
<script src="js/entities.js"></script>
<script src="js/draw.js"></script>
<script src="js/game.js"></script>
<script src="js/title.js"></script>
</body>
</html>
