<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="icon" href="/favicon.ico">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Breaktime">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/solid.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/fontawesome.min.css">
<title>BREAKTIME REBELLION</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="portrait-msg">
  <img src="assets/pics/logo.png" style="width:72vw;max-width:280px;border-radius:8px;border:2px solid #000;margin-bottom:18px">
  <span id="portrait-text"></span>
</div>

<div id="overlay">
  <img id="logo-img" src="assets/pics/logo.png" alt="Breaktime Rebellion">
  <div class="go"></div>

  <div id="title-controls">
    <div id="lvl-chooser">
      <button id="lvl-prev">&#8249;</button>
      <span id="lvl-name"></span>
      <button id="lvl-next">&#8250;</button>
    </div>
    <div id="lang-chooser">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="it">IT</button>
    </div>
    <div id="audio-wrap">
      <button id="audio-toggle"></button>
    </div>
  </div>
  <div id="keyboard-legend">
    <span class="kb kb-arr">↑</span><span class="kb kb-arr">↓</span><span class="kb kb-arr">←</span><span class="kb kb-arr">→</span> <span id="kl-move"></span>
    &nbsp;·&nbsp;
    <span class="kb">Z</span> <span id="kl-action"></span>
    &nbsp;·&nbsp;
    <span class="kb">P</span> <span id="kl-pause"></span>
    &nbsp;·&nbsp;
    <span class="kb">ESC</span> <span id="kl-home"></span>
  </div>
</div>

<div id="wrap">
  <div id="panel-left">
    <button id="btn-home" class="panel-btn"><i class="fa-solid fa-house"></i></button>
    <div id="ctrl-joy">
      <div id="joy-base"><div id="joy-knob"></div></div>
    </div>
  </div>
  <div id="game-area">
    <canvas id="c" width="640" height="400"></canvas>
    <div id="hud-overlay">
      <div id="hud-row">
        <div class="hl"><span id="hL"></span></div>
        <div><span id="hud-msg"></span><i id="hud-obj-icon" class="fa-solid fa-spray-can hud-icon hud-spray"></i><span class="hg" id="hW"></span></div>
        <div><span id="hS"></span></div>
      </div>
      <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
    </div>
    <div id="msg"></div>
    <div id="pause-overlay">
      <div class="game-dialog">
        <span class="dialog-title" id="pause-title">— PAUSA —</span>
        <div class="dialog-btns">
          <button class="dialog-btn" id="btn-resume">RIPRENDI</button>
        </div>
      </div>
    </div>
    <div id="home-confirm-overlay">
      <div class="game-dialog">
        <span class="dialog-title" id="home-confirm-title">TORNARE ALLA HOME?</span>
        <div class="dialog-btns">
          <button class="dialog-btn" id="btn-home-yes">SÌ</button>
          <button class="dialog-btn" id="btn-home-no">NO</button>
        </div>
      </div>
    </div>
  </div>
  <div id="panel-right">
    <button id="btn-pause" class="panel-btn"><i class="fa-solid fa-pause"></i></button>
    <button id="btn-info" class="panel-btn panel-btn-info">i</button>
    <div id="ctrl-action">
      <div id="btn-action"></div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/layout.js"></script>
<script src="js/levels.js"></script>
<script src="js/i18n.js"></script>
<script src="js/audio.js"></script>
<script src="js/state.js"></script>
<script src="js/input.js"></script>
<script src="js/physics.js"></script>
<script src="js/entities.js"></script>
<script src="js/draw.js"></script>
<div id="credits-overlay">
  <div class="credits-box">
    <p class="credits-title">— CREDITS —</p>
    <div class="credits-content">
      <p class="credits-team">LucazadeSoft Team</p>
      <p>Luca Forina<br><span class="credits-role">Orchestrator</span></p>
      <p>Claude by Anthropic<br><span class="credits-role">Lead Developer</span></p>
      <p>ChatGPT<br><span class="credits-role">Graphics</span></p>
      <p>OpenGameArt.org<br><span class="credits-role">Music &amp; Effects</span></p>
      <p>Family<br><span class="credits-role">Beta Testing &amp; Ideas</span></p>
    </div>
    <button class="dialog-btn" id="btn-credits-close">OK</button>
  </div>
</div>
<div id="screen-fade"></div>
<script src="js/game.js"></script>
<script src="js/title.js"></script>
</body>
</html>
