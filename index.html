<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="icon" href="/favicon.ico">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Breaktime">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/solid.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/fontawesome.min.css">
<title>BREAKTIME REBELLION</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="portrait-msg">
  <img src="assets/pics/logo.png" style="width:72vw;max-width:280px;border-radius:8px;border:2px solid #000;margin-bottom:18px">
  <span id="portrait-text"></span>
</div>

<!-- #overlay rimosso: title screen ora su canvas via drawTitleScreen() -->

<div id="wrap">
  <div id="panel-left">
    <button id="btn-home" class="panel-btn"><i class="fa-solid fa-house"></i></button>
    <div id="ctrl-joy">
      <div id="joy-base"><div id="joy-knob"></div></div>
    </div>
  </div>
  <div id="game-area">
    <canvas id="c" width="640" height="400"></canvas>
    <!-- hud-overlay, msg, pause-overlay, home-confirm-overlay rimossi: tutti su canvas -->
  </div>
  <div id="panel-right">
    <button id="btn-pause" class="panel-btn"><i class="fa-solid fa-pause"></i></button>
    <button id="btn-info" class="panel-btn panel-btn-info">i</button>
    <div id="ctrl-action">
      <div id="btn-action"></div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/layout.js"></script>
<script src="js/levels.js"></script>
<script src="js/i18n.js"></script>
<script src="js/audio.js"></script>
<script src="js/state.js"></script>
<script src="js/input.js"></script>
<script src="js/physics.js"></script>
<script src="js/entities.js"></script>
<script src="js/draw.js"></script>
<!-- credits-overlay rimosso: ora su canvas via drawCredits() -->
<div id="screen-fade"></div>
<script src="js/game.js"></script>
<script src="js/title.js"></script>
</body>
</html>
